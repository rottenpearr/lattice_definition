<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:16px;align-items:baseline;border-bottom:1px solid var(--hairline);padding-bottom:10px;}
  .row:last-child{border-bottom:none;}
  .num{font-family:var(--font-mono);font-size:11px;color:var(--mute);letter-spacing:.06em;min-width:48px;text-transform:uppercase;}
  .specimen{flex:1;color:var(--ink);}
  .d{font-family:var(--font-display);font-weight:500;letter-spacing:-0.022em;line-height:1.04;}
  .b{font-family:var(--font-body);line-height:1.45;}
</style></head><body><div class="card">
  <div class="row"><div class="num">80 / display</div><div class="specimen d" style="font-size:64px;">Display</div></div>
  <div class="row"><div class="num">48 / h1</div><div class="specimen d" style="font-size:44px;">Heading one</div></div>
  <div class="row"><div class="num">36 / h2</div><div class="specimen d" style="font-size:32px;">Heading two</div></div>
  <div class="row"><div class="num">28 / h3</div><div class="specimen d" style="font-size:26px;">Heading three</div></div>
  <div class="row"><div class="num">22 / h4</div><div class="specimen b" style="font-size:22px;font-weight:600;">Heading four</div></div>
  <div class="row"><div class="num">18 / lead</div><div class="specimen b" style="font-size:18px;color:var(--ink-soft);">Lead paragraph copy</div></div>
  <div class="row"><div class="num">16 / body</div><div class="specimen b" style="font-size:16px;">Body — основной размер текста</div></div>
  <div class="row"><div class="num">14 / small</div><div class="specimen b" style="font-size:14px;color:var(--ink-soft);">Small — подписи, метаданные</div></div>
  <div class="row"><div class="num">12 / label</div><div class="specimen" style="font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mute);">LABEL — MONO CAPS</div></div>
</div></body></html>
