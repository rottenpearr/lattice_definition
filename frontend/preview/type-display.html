<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:16px;}
  .display{font-family:var(--font-display);font-size:64px;line-height:1.04;letter-spacing:-0.022em;font-weight:500;color:var(--ink);}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);}
  .swatches{display:flex;gap:24px;align-items:baseline;}
  .w{display:flex;gap:8px;align-items:baseline;font-family:var(--font-display);color:var(--ink);}
  .w span:first-child{font-size:36px;font-weight:500;letter-spacing:-0.022em;}
  .w span:last-child{font-family:var(--font-mono);font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:0.08em;}
</style></head><body><div class="card">
  <div class="meta">Space Grotesk — display</div>
  <div class="display">Идентификация решёток</div>
  <div class="swatches">
    <div class="w"><span style="font-weight:400;">Аа</span><span>400</span></div>
    <div class="w"><span style="font-weight:500;">Аа</span><span>500</span></div>
    <div class="w"><span style="font-weight:600;">Аа</span><span>600</span></div>
    <div class="w"><span style="font-weight:700;">Аа</span><span>700</span></div>
  </div>
</div></body></html>
