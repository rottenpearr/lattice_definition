<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:14px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);}
  table{border-collapse:collapse;font-family:var(--font-mono);font-size:13px;color:var(--ink);}
  th{font-weight:500;color:var(--mute);text-transform:uppercase;letter-spacing:.08em;font-size:10px;text-align:left;padding:0 16px 6px 0;}
  td{padding:4px 16px 4px 0;font-variant-numeric:tabular-nums;}
  td.lbl{color:var(--mute);}
  .pill{display:inline-block;padding:2px 6px;border-radius:4px;background:var(--cobalt-wash);color:var(--cobalt-deep);font-family:var(--font-mono);font-size:11px;}
</style></head><body><div class="card">
  <div class="meta">JetBrains Mono — coordinates & code</div>
  <table>
    <thead><tr><th>label</th><th>x</th><th>y</th><th>z</th><th>occ.</th></tr></thead>
    <tbody>
      <tr><td>U1</td><td>0.0000</td><td>0.0000</td><td>0.0000</td><td>1.00</td></tr>
      <tr><td>U2</td><td>0.5000</td><td>0.5000</td><td>0.0000</td><td>1.00</td></tr>
      <tr><td>N1</td><td>0.5000</td><td>0.5000</td><td>0.5000</td><td>1.00</td></tr>
      <tr><td>N2</td><td>0.0000</td><td>0.0000</td><td>0.5000</td><td>1.00</td></tr>
    </tbody>
  </table>
  <div style="font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">
    a = 4.890 Å &nbsp; b = 4.890 Å &nbsp; c = 4.890 Å &nbsp; α=β=γ = 90° &nbsp; <span class="pill">cubic_f</span>
  </div>
</div></body></html>
