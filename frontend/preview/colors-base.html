<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:20px;}
  .row{display:flex;gap:16px;}
  .sw{display:flex;flex-direction:column;gap:8px;flex:1;}
  .chip{height:78px;border-radius:10px;border:1px solid var(--hairline);box-shadow:var(--shadow-card);position:relative;}
  .meta{display:flex;flex-direction:column;gap:2px;}
  .name{font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--mute);}
  .label{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
</style></head><body><div class="card">
  <div>
    <div class="label">Core surfaces & ink</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--paper);"></div><div class="meta"><span class="name">paper</span><span class="hex">#F2EFE8</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--paper-deep);"></div><div class="meta"><span class="name">paper-deep</span><span class="hex">#EAE6DC</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--card);"></div><div class="meta"><span class="name">card</span><span class="hex">#FBFAF6</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--canvas);"></div><div class="meta"><span class="name">canvas</span><span class="hex">#FFFFFF</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--ink);"></div><div class="meta"><span class="name">ink</span><span class="hex">#14171C</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--ink-soft);"></div><div class="meta"><span class="name">ink-soft</span><span class="hex">#2A2D34</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--mute);"></div><div class="meta"><span class="name">mute</span><span class="hex">#5C606A</span></div></div>
      <div class="sw"><div class="chip" style="background:var(--mute-soft);"></div><div class="meta"><span class="name">mute-soft</span><span class="hex">#9094A0</span></div></div>
    </div>
  </div>
</div></body></html>
