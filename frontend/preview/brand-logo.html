<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:32px;display:flex;flex-direction:column;gap:20px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);}
  .row{display:flex;gap:32px;align-items:center;}
  .row img{height:36px;}
  .dark{background:var(--night);padding:16px 20px;border-radius:8px;}
  .dark img{height:32px;}
</style></head><body><div class="card">
  <div class="meta">CRIS — logo</div>
  <div class="row">
    <img src="../assets/logo/cris-wordmark.svg" alt="CRIS">
    <img src="../assets/logo/cris-mark.svg" alt="CRIS mark" style="height:48px;">
  </div>
  <div class="row dark">
    <img src="../assets/logo/cris-wordmark-dark.svg" alt="CRIS on dark">
  </div>
</div></body></html>
