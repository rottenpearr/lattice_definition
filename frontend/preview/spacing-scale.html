<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);}
  .row{display:flex;gap:12px;align-items:flex-end;}
  .b{background:var(--cobalt);height:48px;display:flex;align-items:flex-end;justify-content:center;color:white;font-family:var(--font-mono);font-size:11px;padding-bottom:4px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--mute);}
  .stack{display:flex;flex-direction:column;gap:4px;align-items:center;}
</style></head><body><div class="card">
  <div class="meta">Spacing scale — 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 96 · 128</div>
  <div class="row">
    <div class="stack"><div class="b" style="width:4px;"></div><div class="lbl">4</div></div>
    <div class="stack"><div class="b" style="width:8px;"></div><div class="lbl">8</div></div>
    <div class="stack"><div class="b" style="width:12px;"></div><div class="lbl">12</div></div>
    <div class="stack"><div class="b" style="width:16px;"></div><div class="lbl">16</div></div>
    <div class="stack"><div class="b" style="width:24px;"></div><div class="lbl">24</div></div>
    <div class="stack"><div class="b" style="width:32px;"></div><div class="lbl">32</div></div>
    <div class="stack"><div class="b" style="width:48px;"></div><div class="lbl">48</div></div>
    <div class="stack"><div class="b" style="width:64px;"></div><div class="lbl">64</div></div>
    <div class="stack"><div class="b" style="width:96px;"></div><div class="lbl">96</div></div>
    <div class="stack"><div class="b" style="width:128px;"></div><div class="lbl">128</div></div>
  </div>
</div></body></html>
