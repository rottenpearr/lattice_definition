<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);}
  .card{padding:24px 28px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--mute);margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
  .cell{background:var(--card);border:1px solid var(--hairline);border-radius:8px;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .cell img{width:42px;height:42px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--mute);text-align:center;line-height:1.2;}
</style></head><body><div class="card">
  <div class="meta">Lattice icons — 7 crystal systems</div>
  <div class="grid">
    <div class="cell"><img src="../assets/lattices/cubic.svg" alt=""><div class="lbl">cubic</div></div>
    <div class="cell"><img src="../assets/lattices/tetragonal.svg" alt=""><div class="lbl">tetragonal</div></div>
    <div class="cell"><img src="../assets/lattices/orthorhombic.svg" alt=""><div class="lbl">orthorhombic</div></div>
    <div class="cell"><img src="../assets/lattices/hexagonal.svg" alt=""><div class="lbl">hexagonal</div></div>
    <div class="cell"><img src="../assets/lattices/rhombohedral.svg" alt=""><div class="lbl">rhombohedral</div></div>
    <div class="cell"><img src="../assets/lattices/monoclinic.svg" alt=""><div class="lbl">monoclinic</div></div>
    <div class="cell"><img src="../assets/lattices/triclinic.svg" alt=""><div class="lbl">triclinic</div></div>
  </div>
</div></body></html>
